# Secret stub. DO NOT COMMIT REAL VALUES.
#
# Real deployments create this via SealedSecrets / ExternalSecrets / a
# Helm value, never via a checked-in manifest. This file exists only to
# document the expected keys:
#
#   JFROG_ACCESS_TOKEN     — Artifactory access token for the destination
#   CC_CATALOG_ADMIN_TOKEN — bearer token guarding POST endpoints
#
# Create locally for testing with:
#   kubectl -n cc-catalog-svc create secret generic cc-catalog-svc-secrets \
#       --from-literal=JFROG_ACCESS_TOKEN=... \
#       --from-literal=CC_CATALOG_ADMIN_TOKEN=admin-$(openssl rand -hex 16)
apiVersion: v1
kind: Secret
metadata:
  name: cc-catalog-svc-secrets
  namespace: cc-catalog-svc
type: Opaque
stringData:
  JFROG_ACCESS_TOKEN: "REPLACE_WITH_REAL_TOKEN"
  CC_CATALOG_ADMIN_TOKEN: "REPLACE_WITH_ADMIN_TOKEN"

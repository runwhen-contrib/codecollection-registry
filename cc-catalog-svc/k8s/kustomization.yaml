apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Apply with:
#   kubectl apply -k k8s/
#
# Replace `secret.example.yaml` with your real secret (SealedSecret /
# ExternalSecret / Vault sync). The example file fails fast at startup
# because both values are placeholders.
namespace: cc-catalog-svc

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.example.yaml
  - pvc.yaml
  - deployment.yaml

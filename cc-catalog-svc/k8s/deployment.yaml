apiVersion: apps/v1
kind: Deployment
metadata:
  name: cc-catalog-svc
  namespace: cc-catalog-svc
  labels:
    app: cc-catalog-svc
    component: api
spec:
  # Single replica because the scheduler runs in-process. If you need
  # HA, split into:
  #   - one replica with CC_CATALOG_DISABLE_SCHEDULER unset (scheduler)
  #   - N replicas with CC_CATALOG_DISABLE_SCHEDULER=1 (API)
  # all sharing a Postgres DB.
  replicas: 1
  strategy:
    type: Recreate           # avoid two scheduler pods racing
  selector:
    matchLabels:
      app: cc-catalog-svc
      component: api
  template:
    metadata:
      labels:
        app: cc-catalog-svc
        component: api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: cc-catalog-svc
          image: ghcr.io/runwhen-contrib/cc-catalog-svc:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: CC_CATALOG_CONFIG_FILE
              value: /etc/cc-catalog/config.yaml
            - name: CC_CATALOG_DB_URL
              value: sqlite:////data/catalog.db
            - name: CC_CATALOG_LOG_LEVEL
              value: INFO
          envFrom:
            - secretRef:
                name: cc-catalog-svc-secrets
                optional: false
          volumeMounts:
            - name: config
              mountPath: /etc/cc-catalog
              readOnly: true
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 4
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
      volumes:
        - name: config
          configMap:
            name: cc-catalog-svc-config
        - name: data
          persistentVolumeClaim:
            claimName: cc-catalog-svc-data
---
apiVersion: v1
kind: Service
metadata:
  name: cc-catalog-svc
  namespace: cc-catalog-svc
  labels:
    app: cc-catalog-svc
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    app: cc-catalog-svc
    component: api
